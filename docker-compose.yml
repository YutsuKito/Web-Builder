version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: css_html_generator_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-css_html_generator}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-css_html_generator}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
